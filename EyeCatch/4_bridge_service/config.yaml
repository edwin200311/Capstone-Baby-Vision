# EyeCatch 브릿지 서비스 설정
# 브릿지는 AI ↔ 프론트, AI ↔ 메인서버 사이의 중계 역할

stream_proxy:
  host: "0.0.0.0"
  port: 9000
  # 영상 스트림 방식 (mjpeg / webrtc / rtsp 중 선택)
  protocol: "mjpeg"

event_broker:
  # AI → 메인 서버 이벤트 전달 방식
  mode: "http"  # http / redis / websocket 중 선택
  main_server_url: "http://localhost:8000/api/alerts/event"
  # Redis 사용 시 (mode: redis)
  # redis_host: "localhost"
  # redis_port: 6379
  # redis_channel: "eyecatch_alerts"

ai_vision:
  # AI 프로세스로부터 받을 소스
  source_host: "localhost"
  source_port: 9001
