services:
  db:
    image: postgres:16
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

# 데이터베이스가 준비될 때까지 기다리는 헬스체크 추가
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: ./app
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy #healthcheck가 통과된 후에 app이 시작되도록 설정
    volumes:
      - ./app:/app

volumes:
  postgres_data: